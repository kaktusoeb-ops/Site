<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин Виртов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a2e;
            color: #eee;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        .card {
            background: #16213e;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            max-width: 320px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        
        .title {
            font-size: 1.5em;
            margin-bottom: 15px;
        }
        
        .balance {
            font-size: 2.5em;
            font-weight: bold;
            color: #e94560;
            margin: 15px 0;
        }
        
        .btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 12px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-buy {
            background: #e94560;
            color: white;
        }
        
        .btn-sound {
            background: #0f3460;
            color: #eee;
        }
        
        .btn-sound.active {
            background: #1a8a3f;
        }

        .pulse {
            animation: pulse 0.3s ease-out;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); background: #ff6b81; }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="title">💎 Виртуальная валюта</div>
        <div class="balance" id="balance">0 💎</div>
        <button class="btn btn-sound" id="btnSound">🔇 Включить звук</button>
        <button class="btn btn-buy" id="btnBuy">💰 Купить +10 💎</button>
        <p style="margin-top: 15px; font-size: 0.8em; opacity: 0.6;">Приятных покупок!</p>
    </div>

    <audio id="bgMusic" loop preload="auto">
        <source src="bg-music.mp3" type="audio/mpeg">
    </audio>
    <audio id="clickSound" preload="auto">
        <source src="click.mp3" type="audio/mpeg">
    </audio>
    <audio id="buySound" preload="auto">
        <source src="buy.mp3" type="audio/mpeg">
    </audio>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let balance = 0;
        let soundEnabled = false;
        
        const bgMusic = document.getElementById('bgMusic');
        const clickSound = document.getElementById('clickSound');
        const buySound = document.getElementById('buySound');
        const btnSound = document.getElementById('btnSound');
        const btnBuy = document.getElementById('btnBuy');
        const balanceEl = document.getElementById('balance');
        
        bgMusic.volume = 0.4;
        clickSound.volume = 0.7;
        buySound.volume = 0.8;

        function playSound(sound) {
            if (!soundEnabled) return;
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            
            if (soundEnabled) {
                btnSound.textContent = '🔊 Звук вкл';
                btnSound.classList.add('active');
                bgMusic.play().catch(() => {});
            } else {
                btnSound.textContent = '🔇 Включить звук';
                btnSound.classList.remove('active');
                bgMusic.pause();
            }
            playSound(clickSound);
        }

        function buyVirts() {
            balance += 10;
            balanceEl.textContent = balance + ' 💎';
            
            balanceEl.classList.remove('pulse');
            void balanceEl.offsetWidth;
            balanceEl.classList.add('pulse');
            
            playSound(buySound);
            
            tg.sendData(JSON.stringify({
                action: 'buy',
                amount: 10,
                balance: balance
            }));
        }

        btnSound.addEventListener('click', toggleSound);
        btnBuy.addEventListener('click', buyVirts);
        
        if (!soundEnabled) {
            bgMusic.pause();
        }
    </script>
</body>
</html>
