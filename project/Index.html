<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arthas Store</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/buttons.css">
    <link rel="stylesheet" href="css/menu.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="overlay"></div>

<button class="music-btn" id="musicToggle">
    <img src="assets/images/frostmourne.png" alt="music">
</button>

<div class="menu-container">

    <h1 class="main-title">
        ARTHAS STORE
    </h1>

    <div class="menu-buttons">

        <button class="menu-btn buy-btn" id="buyCurrencyBtn">
            💎 Приобрести валюту
        </button>

        <button class="menu-btn account-btn" id="buyAccountBtn">
            👑 Приобрести аккаунт
        </button>

        <button class="menu-btn reviews-btn" id="reviewsBtn">
            📜 Отзывы
        </button>

        <button class="menu-btn support-btn" id="supportBtn">
            ⚔ Поддержка
        </button>

    </div>

</div>

<audio id="bgMusic" loop>
    <source src="assets/audio/bg-music.mp3" type="audio/mpeg">
</audio>

<script src="js/audio.js"></script>
<script src="js/menu.js"></script>
<script src="js/telegram.js"></script>
<script src="js/app.js"></script>

</body>
</html>
